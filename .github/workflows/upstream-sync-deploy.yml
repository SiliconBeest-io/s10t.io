# =============================================================================
# SiliconBeest Instance — Upstream Sync & Auto-Deploy
#
# Checks the upstream template repo (SJang1/siliconbeest) for new releases
# (git tags). If a new release is found, merges upstream changes and deploys
# all Cloudflare Workers.
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN   — CF API token with Workers/D1/R2/KV/Queues permissions
#   CLOUDFLARE_ACCOUNT_ID  — Your Cloudflare account ID
#
# Required GitHub Repository Variables:
#   PROJECT_PREFIX     — Resource name prefix (e.g. "siliconbeest")
#   INSTANCE_DOMAIN    — Your instance domain (e.g. "social.example.com")
#   INSTANCE_TITLE     — Display name for your instance
#   REPOSITORY_URL     — Public source repository URL
#   REGISTRATION_MODE  — "open", "approval", or "closed"
#   D1_DATABASE_ID     — D1 database UUID
#   KV_CACHE_ID        — KV namespace ID for cache
#   KV_SESSIONS_ID     — KV namespace ID for sessions
#   KV_FEDIFY_ID       — KV namespace ID for Fedify
#
# Optional GitHub Repository Variables:
#   AUTO_UPDATE_UPSTREAM_DEPLOY — "true" (default) or "false" (sync only, skip deploy after upstream update)
# GitHub Environment Variables (production):
#   SKIP_SIGNATURE_VERIFICATION — "false" (default) or "true" (testing only)
#   WORKERS_AI_ENABLED — "false" (default) or "true" (enable optional Workers AI features)
#   WORKERS_AI_RECOMMENDATION_MODEL — Workers AI recommendation model ID
#   WORKERS_AI_TRANSLATION_MODEL — Workers AI translation model ID
#   WORKERS_AI_IMAGE_CAPTION_MODEL — Workers AI image caption model ID
#   WORKERS_AI_RATE_LIMITS — "true" (default) or "false" (omit native rate-limit bindings)
#   WORKERS_AI_RECOMMENDATION_RATE_LIMIT — positive integer (default "2")
#   WORKERS_AI_RECOMMENDATION_RATE_LIMIT_PERIOD_SECONDS — "10" or "60" (default "60")
#   WORKERS_AI_TRANSLATION_RATE_LIMIT — positive integer (default "6")
#   WORKERS_AI_TRANSLATION_RATE_LIMIT_PERIOD_SECONDS — "10" or "60" (default "60")
#   WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT — positive integer (default "4")
#   WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_PERIOD_SECONDS — "10" or "60" (default "60")
#   WORKERS_AI_RECOMMENDATION_RATE_LIMIT_NAMESPACE_ID — positive integer (default "1001")
#   WORKERS_AI_TRANSLATION_RATE_LIMIT_NAMESPACE_ID — positive integer (default "1002")
#   WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_NAMESPACE_ID — positive integer (default "1003")
# Use namespace IDs that differ from the preview environment.
# =============================================================================

name: Sync Upstream & Deploy

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 00:00 UTC (09:00 KST)
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Deploy even without new upstream release"
        type: boolean
        default: false

env:
  UPSTREAM_REPO: ${{ vars.REPOSITORY_URL || 'https://github.com/SJang1/siliconbeest.git' }}

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      new_tag: ${{ steps.decide.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream "${{ env.UPSTREAM_REPO }}" 2>/dev/null || true
          git fetch upstream --tags --prune

      - name: Check for new upstream release
        id: decide
        run: |
          # Get latest upstream tag (semver sorted)
          LATEST_TAG=$(git tag -l --sort=-v:refname | head -1)
          CURRENT_TAG=$(cat .upstream-version 2>/dev/null | tr -d '[:space:]' || echo "none")

          echo "Latest upstream tag: ${LATEST_TAG:-none}"
          echo "Current synced tag:  $CURRENT_TAG"

          if [[ -z "$LATEST_TAG" ]]; then
            echo "No upstream tags found"
            echo "should_deploy=${{ inputs.force_deploy || false }}" >> "$GITHUB_OUTPUT"
            echo "new_tag=" >> "$GITHUB_OUTPUT"
          elif [[ "$LATEST_TAG" != "$CURRENT_TAG" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.force_deploy }}" == "true" ]]; then
            echo "Already up to date at $CURRENT_TAG; forcing deploy only"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=" >> "$GITHUB_OUTPUT"
          else
            echo "Already up to date at $CURRENT_TAG"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "new_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream changes
        id: merge
        if: steps.decide.outputs.should_deploy == 'true' && steps.decide.outputs.new_tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ steps.decide.outputs.new_tag }}"

          echo "Merging upstream tag $TAG..."
          BEFORE=$(git rev-parse HEAD)
          if git merge "$TAG" --no-edit --allow-unrelated-histories -m "chore: sync upstream to $TAG"; then
            AFTER=$(git rev-parse HEAD)
            if [[ "$BEFORE" == "$AFTER" ]]; then
              # Merge was "Already up to date" — just update version file
              echo "$TAG" > .upstream-version
              git add .upstream-version
              if ! git diff --cached --quiet; then
                git commit -m "chore: sync upstream to $TAG"
              fi
            else
              # Merge created a new commit — amend it to include version file
              echo "$TAG" > .upstream-version
              git add .upstream-version
              git commit --amend --no-edit
            fi
            echo "merge_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "merge_ok=false" >> "$GITHUB_OUTPUT"
            CONFLICTED=$(git diff --name-only --diff-filter=U | head -20)
            echo "conflicted_files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONFLICTED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            git merge --abort 2>/dev/null || true
          fi

      - name: Create issue on merge conflict
        if: steps.merge.outputs.merge_ok == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.decide.outputs.new_tag }}';
            const files = `${{ steps.merge.outputs.conflicted_files }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync conflict: ${tag}`,
              body: [
                `Automatic merge of upstream tag \`${tag}\` failed due to conflicts.`,
                '',
                '**Conflicting files:**',
                '```',
                files,
                '```',
                '',
                '**To resolve manually:**',
                '```bash',
                `git remote add upstream ${process.env.UPSTREAM_REPO}`,
                'git fetch upstream --tags',
                `git merge upstream/main`,
                '# Resolve conflicts, then:',
                `echo "${tag}" > .upstream-version`,
                'git add -A && git commit',
                'git push',
                '```',
              ].join('\n'),
              labels: ['upstream-sync', 'conflict'],
            });

      - name: Fail on merge conflict
        if: steps.merge.outputs.merge_ok == 'false'
        run: |
          echo "::error::Merge conflict detected. A GitHub Issue has been created."
          exit 1

      - name: Push synced changes
        if: steps.merge.outputs.merge_ok == 'true'
        run: git push origin main

  deploy:
    needs: check-and-sync
    if: |
      needs.check-and-sync.outputs.should_deploy == 'true' &&
      (vars.AUTO_UPDATE_UPSTREAM_DEPLOY != 'false')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate config.env from GitHub Variables
        env:
          V_PROJECT_PREFIX: ${{ vars.PROJECT_PREFIX }}
          V_INSTANCE_DOMAIN: ${{ vars.INSTANCE_DOMAIN }}
          V_INSTANCE_TITLE: ${{ vars.INSTANCE_TITLE }}
          V_REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
          V_REGISTRATION_MODE: ${{ vars.REGISTRATION_MODE }}
          V_SKIP_SIGNATURE_VERIFICATION: ${{ vars.SKIP_SIGNATURE_VERIFICATION }}
          V_WORKERS_AI_ENABLED: ${{ vars.WORKERS_AI_ENABLED }}
          V_WORKERS_AI_RECOMMENDATION_MODEL: ${{ vars.WORKERS_AI_RECOMMENDATION_MODEL }}
          V_WORKERS_AI_TRANSLATION_MODEL: ${{ vars.WORKERS_AI_TRANSLATION_MODEL }}
          V_WORKERS_AI_IMAGE_CAPTION_MODEL: ${{ vars.WORKERS_AI_IMAGE_CAPTION_MODEL }}
          V_WORKERS_AI_RATE_LIMITS: ${{ vars.WORKERS_AI_RATE_LIMITS }}
          V_WORKERS_AI_RECOMMENDATION_RATE_LIMIT: ${{ vars.WORKERS_AI_RECOMMENDATION_RATE_LIMIT }}
          V_WORKERS_AI_RECOMMENDATION_RATE_LIMIT_PERIOD_SECONDS: ${{ vars.WORKERS_AI_RECOMMENDATION_RATE_LIMIT_PERIOD_SECONDS }}
          V_WORKERS_AI_TRANSLATION_RATE_LIMIT: ${{ vars.WORKERS_AI_TRANSLATION_RATE_LIMIT }}
          V_WORKERS_AI_TRANSLATION_RATE_LIMIT_PERIOD_SECONDS: ${{ vars.WORKERS_AI_TRANSLATION_RATE_LIMIT_PERIOD_SECONDS }}
          V_WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT: ${{ vars.WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT }}
          V_WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_PERIOD_SECONDS: ${{ vars.WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_PERIOD_SECONDS }}
          V_WORKERS_AI_RECOMMENDATION_RATE_LIMIT_NAMESPACE_ID: ${{ vars.WORKERS_AI_RECOMMENDATION_RATE_LIMIT_NAMESPACE_ID }}
          V_WORKERS_AI_TRANSLATION_RATE_LIMIT_NAMESPACE_ID: ${{ vars.WORKERS_AI_TRANSLATION_RATE_LIMIT_NAMESPACE_ID }}
          V_WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_NAMESPACE_ID: ${{ vars.WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_NAMESPACE_ID }}
          V_D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          V_KV_CACHE_ID: ${{ vars.KV_CACHE_ID }}
          V_KV_SESSIONS_ID: ${{ vars.KV_SESSIONS_ID }}
          V_KV_FEDIFY_ID: ${{ vars.KV_FEDIFY_ID }}
        run: |
          cat > scripts/config.env <<EOF
          PROJECT_PREFIX="${V_PROJECT_PREFIX}"
          INSTANCE_DOMAIN="${V_INSTANCE_DOMAIN}"
          INSTANCE_TITLE="${V_INSTANCE_TITLE}"
          REPOSITORY_URL="${V_REPOSITORY_URL}"
          REGISTRATION_MODE="${V_REGISTRATION_MODE}"
          SKIP_SIGNATURE_VERIFICATION="${V_SKIP_SIGNATURE_VERIFICATION:-false}"
          WORKERS_AI_ENABLED="${V_WORKERS_AI_ENABLED:-false}"
          WORKERS_AI_RECOMMENDATION_MODEL="${V_WORKERS_AI_RECOMMENDATION_MODEL:-@cf/baai/bge-m3}"
          WORKERS_AI_TRANSLATION_MODEL="${V_WORKERS_AI_TRANSLATION_MODEL:-@cf/meta/m2m100-1.2b}"
          WORKERS_AI_IMAGE_CAPTION_MODEL="${V_WORKERS_AI_IMAGE_CAPTION_MODEL:-@cf/moondream/moondream3.1-9B-A2B}"
          WORKERS_AI_RATE_LIMITS="${V_WORKERS_AI_RATE_LIMITS:-true}"
          WORKERS_AI_RECOMMENDATION_RATE_LIMIT="${V_WORKERS_AI_RECOMMENDATION_RATE_LIMIT:-2}"
          WORKERS_AI_RECOMMENDATION_RATE_LIMIT_PERIOD_SECONDS="${V_WORKERS_AI_RECOMMENDATION_RATE_LIMIT_PERIOD_SECONDS:-60}"
          WORKERS_AI_TRANSLATION_RATE_LIMIT="${V_WORKERS_AI_TRANSLATION_RATE_LIMIT:-6}"
          WORKERS_AI_TRANSLATION_RATE_LIMIT_PERIOD_SECONDS="${V_WORKERS_AI_TRANSLATION_RATE_LIMIT_PERIOD_SECONDS:-60}"
          WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT="${V_WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT:-4}"
          WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_PERIOD_SECONDS="${V_WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_PERIOD_SECONDS:-60}"
          WORKERS_AI_RECOMMENDATION_RATE_LIMIT_NAMESPACE_ID="${V_WORKERS_AI_RECOMMENDATION_RATE_LIMIT_NAMESPACE_ID:-1001}"
          WORKERS_AI_TRANSLATION_RATE_LIMIT_NAMESPACE_ID="${V_WORKERS_AI_TRANSLATION_RATE_LIMIT_NAMESPACE_ID:-1002}"
          WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_NAMESPACE_ID="${V_WORKERS_AI_IMAGE_DESCRIPTION_RATE_LIMIT_NAMESPACE_ID:-1003}"
          D1_DATABASE_ID="${V_D1_DATABASE_ID}"
          KV_CACHE_ID="${V_KV_CACHE_ID}"
          KV_SESSIONS_ID="${V_KV_SESSIONS_ID}"
          KV_FEDIFY_ID="${V_KV_FEDIFY_ID}"
          EOF

      - name: Generate wrangler.jsonc files
        run: ./scripts/sync-config.sh --apply

      - name: Generate Worker types and type-check
        run: |
          pnpm --dir siliconbeest cf-typegen
          pnpm --dir siliconbeest exec tsc --noEmit -p tsconfig.worker.json

      - name: Build
        run: |
          echo "VITE_INSTANCE_DOMAIN=${{ vars.INSTANCE_DOMAIN }}" > siliconbeest/.env
          cd siliconbeest && pnpm run build
          ls -la .output/public/

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          source scripts/config.sh
          source scripts/config.env
          cd siliconbeest && npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote

      - name: Deploy main worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: cd siliconbeest && pnpm wrangler deploy .output/server/index.mjs --assets .output/public --config wrangler.jsonc

      - name: Deploy queue consumer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: cd siliconbeest-queue-consumer && npx wrangler deploy

      - name: Deploy email sender
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: cd siliconbeest-email-sender && npx wrangler deploy
