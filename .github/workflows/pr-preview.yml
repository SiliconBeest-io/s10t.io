# Uploads an undeployed Worker version for each trusted, same-repository PR.
#
# Repository setup required:
#   1. Create a GitHub Environment named "preview".
#   2. Add the repository CODEOWNER(s) as required reviewers for that environment.
#   3. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as environment secrets.
#
# Each approved run updates the stable pr-<number> preview alias. A new push to
# the PR starts a fresh run, which is gated by the preview environment again.

name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "siliconbeest/**"
      - "packages/**"
      - "scripts/config.sh"
      - "scripts/sync-config.sh"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  upload-preview:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: preview
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate config.env from GitHub Variables
        env:
          V_PROJECT_PREFIX: ${{ vars.PROJECT_PREFIX }}
          V_INSTANCE_DOMAIN: ${{ vars.INSTANCE_DOMAIN }}
          V_INSTANCE_TITLE: ${{ vars.INSTANCE_TITLE }}
          V_REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
          V_REGISTRATION_MODE: ${{ vars.REGISTRATION_MODE }}
          V_SKIP_SIGNATURE_VERIFICATION: ${{ vars.SKIP_SIGNATURE_VERIFICATION }}
          V_D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          V_KV_CACHE_ID: ${{ vars.KV_CACHE_ID }}
          V_KV_SESSIONS_ID: ${{ vars.KV_SESSIONS_ID }}
          V_KV_FEDIFY_ID: ${{ vars.KV_FEDIFY_ID }}
        run: |
          cat > scripts/config.env <<EOF
          PROJECT_PREFIX="${V_PROJECT_PREFIX}"
          INSTANCE_DOMAIN="${V_INSTANCE_DOMAIN}"
          INSTANCE_TITLE="${V_INSTANCE_TITLE}"
          REPOSITORY_URL="${V_REPOSITORY_URL}"
          REGISTRATION_MODE="${V_REGISTRATION_MODE}"
          SKIP_SIGNATURE_VERIFICATION="${V_SKIP_SIGNATURE_VERIFICATION:-false}"
          D1_DATABASE_ID="${V_D1_DATABASE_ID}"
          KV_CACHE_ID="${V_KV_CACHE_ID}"
          KV_SESSIONS_ID="${V_KV_SESSIONS_ID}"
          KV_FEDIFY_ID="${V_KV_FEDIFY_ID}"
          EOF

      - name: Generate wrangler.jsonc files
        run: ./scripts/sync-config.sh --apply

      - name: Build
        run: |
          echo "VITE_INSTANCE_DOMAIN=${{ vars.INSTANCE_DOMAIN }}" > siliconbeest/.env
          pnpm --dir siliconbeest run build

      - name: Upload preview version
        working-directory: siliconbeest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
        run: |
          pnpm wrangler versions upload .output/server/index.mjs \
            --assets .output/public \
            --config wrangler.jsonc \
            --preview-alias "$PREVIEW_ALIAS" \
            --message "PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}"
